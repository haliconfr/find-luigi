<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Find Luigi - Multiplayer</title>
  <link rel="stylesheet" href="multiplayer.css">
</head>
<body>
    <div id="username-input-container">
        <input type="text" id="username-input" maxlength="9" placeholder="Enter your username">
        <button onclick="startMultiplayer()" id="submit-button">>></button>
      </div>
    <div id="waiting-room" style="display: none;">
      <h2>Finding opponent...</h2>
      <p id="connection-status"></p>
    </div>
    <div id="level-order-container" style="display: none;">
        <h2>Order Your Levels</h2>
        <div id="difficulty-options"></div>
        <div id="level-slots">
          <div class="level-slot" data-index="0"></div>
          <div class="level-slot" data-index="1"></div>
          <div class="level-slot" data-index="2"></div>
          <div class="level-slot" data-index="3"></div>
        </div>
        <button id="confirm-order">Confirm Order</button>
    </div>
    <div id="game-container" style="display: none;"></div>
  <script src="multiplayer.js"></script>
</body>
</html>
